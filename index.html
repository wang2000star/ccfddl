<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCF Timeline - CCF 会议/期刊时间线</title>
    <meta name="description" content="CCF推荐国际学术会议和期刊时间线查询 - 投稿截止、Rebuttal、录用通知、会议日期">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">📅</span>
                <h1 class="logo-text" data-i18n="appTitle">CCF Timeline</h1>
            </div>
            <div class="header-actions">
                <button class="btn btn-sm lang-toggle" id="langToggle" title="Switch Language / 切换语言">
                    <span class="lang-zh">中</span><span class="lang-divider">/</span><span class="lang-en">EN</span>
                </button>
                <a href="https://github.com/wang2000star/ccfddl" class="btn btn-sm btn-ghost" target="_blank" title="GitHub">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.605-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/></svg>
                </a>
            </div>
        </div>
    </header>

    <!-- Filter Bar -->
    <section class="filter-bar" id="filterBar">
        <div class="filter-inner">
            <!-- Search -->
            <div class="search-box">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="searchInput" class="search-input" data-i18n-placeholder="searchPlaceholder" placeholder="搜索会议/期刊名称或缩写...">
            </div>

            <!-- Type Toggle -->
            <div class="toggle-group" id="typeToggle">
                <button class="toggle-btn active" data-type="conference" data-i18n="typeConference">会议</button>
                <button class="toggle-btn" data-type="journal" data-i18n="typeJournal">期刊</button>
                <button class="toggle-btn" data-type="all" data-i18n="typeAll">全部</button>
            </div>

            <!-- Rank Filter -->
            <div class="toggle-group" id="rankFilter">
                <button class="toggle-btn rank-a active" data-rank="A">CCF-A</button>
                <button class="toggle-btn rank-b active" data-rank="B">CCF-B</button>
                <button class="toggle-btn rank-c active" data-rank="C">CCF-C</button>
            </div>

            <!-- Category Filter -->
            <select id="categoryFilter" class="select-filter">
                <option value="all" data-i18n="categoryAll">全部领域</option>
            </select>

            <!-- Year Filter -->
            <select id="yearFilter" class="select-filter">
                <option value="2026">2026</option>
                <option value="2025">2025</option>
            </select>
        </div>
    </section>

    <!-- Stats Bar -->
    <div class="stats-bar" id="statsBar">
        <span id="statsText"></span>
    </div>

    <!-- Card Grid -->
    <main class="card-grid" id="cardGrid">
        <!-- Cards rendered here -->
    </main>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display:none;">
        <div class="empty-icon">🔍</div>
        <h2 data-i18n="noResults">没有找到匹配的结果</h2>
        <p data-i18n="noResultsHint">尝试调整筛选条件或搜索关键词</p>
    </div>

    <!-- Loading State -->
    <div class="loading-state" id="loadingState">
        <div class="spinner"></div>
        <p data-i18n="loading">加载中...</p>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>Data: CCF Recommended List 7th Edition (2026-03) · <a href="https://www.ccf.org.cn/Academic_Evaluation/By_category/" target="_blank">CCF Official</a></p>
        <p>Built with ❤️ for the CS research community</p>
    </footer>

    <script>
    // Inline test - bypasses all caching
    (function() {
        var el = document.getElementById('loadingState');
        if (!el) return;
        el.innerHTML = '<div style="text-align:left;padding:20px;font-family:monospace;font-size:0.75rem;">' +
            '<div>🔍 Testing fetch...</div>';

        fetch('data/conferences.json')
            .then(function(r) {
                el.innerHTML += '<div>📡 Status: ' + r.status + '</div>';
                return r.json();
            })
            .then(function(d) {
                el.innerHTML += '<div>✅ SUCCESS! ' + d.length + ' conferences loaded</div>';
                el.innerHTML += '<div style="color:#16a34a;font-size:1.2rem;margin-top:10px;">' +
                    '🎉 数据加载成功！Data loaded OK!<br>' +
                    '如果你看到这条消息但页面没变化，请报告：<br>' +
                    '看到此消息 = JS能运行 = 问题在app.js</div>';
            })
            .catch(function(e) {
                el.innerHTML += '<div style="color:#dc2626;">❌ FAILED: ' + e.message + '</div>';
            });
    })();
    </script>
    <script src="js/i18n.js?v=2"></script>
    <script src="js/data-loader.js?v=2"></script>
    <script src="js/renderer.js?v=2"></script>
    <script src="js/timeline.js?v=2"></script>
    <script src="js/search.js?v=2"></script>
    <script src="js/app.js?v=2"></script>
    <noscript>
        <div style="text-align:center;padding:40px;color:#dc2626;">
            ⚠️ 请启用JavaScript以使用本网站 / Please enable JavaScript to use this site.
        </div>
    </noscript>
</body>
</html>
